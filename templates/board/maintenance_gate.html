{% extends "base.html" %}
{% block title %}Przerwa techniczna{% endblock %}

{% block content %}
<article style="max-width: 420px; margin: 4rem auto;">
  <h2>Przerwa techniczna</h2>

  <p>{{ message }}</p>

  {% if not readonly %}
    <p style="font-size:13px; color:#555;">
      Logowanie dostępne tylko dla wybranych użytkowników.
    </p>

    {% if error %}
      <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post" action="{% url 'maintenance_gate' %}">
      {% csrf_token %}
      <label style="display:block; margin-bottom:.6rem;">
        <span style="display:block; font-size:12px; margin-bottom:.2rem;">Nick</span>
        <input type="text" name="username" required autocomplete="username"
               style="width:100%; box-sizing:border-box;">
      </label>
      <label style="display:block; margin-bottom:.6rem;">
        <span style="display:block; font-size:12px; margin-bottom:.2rem;">Hasło</span>
        <input type="password" name="password" required autocomplete="current-password"
               style="width:100%; box-sizing:border-box;">
      </label>
      <button type="submit">Zaloguj</button>
    </form>
  {% endif %}
</article>
{% endblock %}
