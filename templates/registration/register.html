{% extends "base.html" %}
{% block title %}Rejestracja{% endblock %}

{% block content %}
<article style="max-width: 400px; margin: 4rem auto;">
  <h2>Rejestracja</h2>
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
      <label>{{ field.label }}{{ field }}
        {% if field.help_text %}<small>{{ field.help_text }}</small>{% endif %}
        {% if field.errors %}<small style="color:red;">{{ field.errors|join:", " }}</small>{% endif %}
      </label>
    {% endfor %}
    <button type="submit">Utwórz konto</button>
  </form>
  <p><a href="{% url 'login' %}">Masz już konto? Zaloguj się.</a></p>
</article>
{% endblock %}
