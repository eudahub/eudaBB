# Nginx config — serwer TESTOWY eudaBB
# HTTP Basic Auth wpuszcza tylko zaproszonych testerów.
#
# Instalacja:
#   sudo cp deploy/nginx-test.conf /etc/nginx/sites-available/eudabb-test
#   sudo ln -s /etc/nginx/sites-available/eudabb-test /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Dodawanie testerów:
#   sudo htpasswd -c /etc/nginx/.htpasswd-eudabb jan     # pierwszy user (tworzy plik)
#   sudo htpasswd    /etc/nginx/.htpasswd-eudabb anna    # kolejny user
#   sudo htpasswd -D /etc/nginx/.htpasswd-eudabb jan     # usunięcie usera
#   sudo systemctl reload nginx                          # przeładuj po zmianach

server {
    listen 80;
    server_name twojadomena.pl;   # ← zmień na swoją domenę lub IP serwera

    # HTTP Basic Auth — nginx pyta o hasło zanim cokolwiek trafi do Django
    auth_basic "eudaBB — dostęp testowy";
    auth_basic_user_file /etc/nginx/.htpasswd-eudabb;

    # Pliki statyczne — serwowane bezpośrednio przez nginx (szybciej)
    location /static/ {
        alias /home/andrzej/wazne/gitmy/eudaBB/staticfiles/;
        expires 1h;
    }

    location /media/ {
        alias /home/andrzej/wazne/gitmy/eudaBB/media/;
        expires 1h;
    }

    # Reszta → Gunicorn/Django
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
