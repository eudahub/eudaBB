# Nginx config — serwer PRODUKCYJNY eudaBB
# Bez Basic Auth. HTTPS przez Let's Encrypt (certbot).
#
# Instalacja certyfikatu:
#   sudo certbot --nginx -d twojadomena.pl
#
# Instalacja configa:
#   sudo cp deploy/nginx-prod.conf /etc/nginx/sites-available/eudabb
#   sudo ln -s /etc/nginx/sites-available/eudabb /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name twojadomena.pl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name twojadomena.pl;   # ← zmień

    # certbot wypełni te linie automatycznie:
    # ssl_certificate     /etc/letsencrypt/live/twojadomena.pl/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/twojadomena.pl/privkey.pem;

    location /static/ {
        alias /home/andrzej/wazne/gitmy/eudaBB/staticfiles/;
        expires 7d;
    }

    location /media/ {
        alias /home/andrzej/wazne/gitmy/eudaBB/media/;
        expires 7d;
    }

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
